<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Floor Plan & Carpet Calculator</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Left Sidebar -->
    <div class="sidebar">
      <h2>🛠️ Tools</h2>
      
      <div class="save-section">
        <h3>💾 Save/Load</h3>
        <button class="btn" onclick="savePlan()">Save Plan</button>
        <button class="btn" onclick="showLoadModal()">Load Plan</button>
        <div id="currentPlanId" class="plan-id" style="display:none;"></div>
      </div>
      
      <div class="section">
        <h3>Drawing Mode</h3>
        <button class="btn active" id="btnDraw" onclick="setMode('draw')">
          📐 Draw Room
        </button>
        <button class="btn" id="btnSelect" onclick="setMode('select')">
          ↖️ Select/Move
        </button>
        <button class="btn" id="btnDoor" onclick="setMode('door')">
          🚪 Add Door
        </button>
        <button class="btn" id="btnFreehand" onclick="setMode('freehand')">
          ✏️ Freehand Draw
        </button>
        <button class="btn" id="btnErase" onclick="setMode('erase')">
          🧹 Erase Freehand
        </button>
        <div class="line-straighten-notice">
          ℹ️ Lines auto-straighten if nearly horizontal/vertical
        </div>
      </div>

      <div class="section">
        <h3>Door Settings</h3>
        <div class="input-row">
          <label>Door Width (m):</label>
          <input type="number" id="doorWidth" step="0.1" value="0.9">
        </div>
        <div class="input-row">
          <label>Door Type:</label>
          <select id="doorType">
            <option value="single">Single Door</option>
            <option value="double">Double Door</option>
            <option value="sliding">Sliding Door</option>
          </select>
        </div>
      </div>

      <div class="section">
        <h3>Freehand Settings</h3>
        <div class="input-row">
          <label>Pen Size:</label>
          <input type="range" id="penSize" min="1" max="10" value="3" 
                 oninput="document.getElementById('penSizeVal').textContent=this.value">
          <span id="penSizeVal" style="color: #ecf0f1;">3</span>
        </div>
        <div class="input-row">
          <label>Pen Color:</label>
          <input type="color" id="penColor" value="#2c3e50">
        </div>
      </div>

      <div class="section">
        <h3>Carpet Settings</h3>
        <div class="input-row">
          <label>Roll Width (m):</label>
          <input type="number" id="rollWidth" step="0.01" value="4">
        </div>
        <div class="input-row">
          <label>Round Length To (m):</label>
          <input type="number" id="roundTo" step="0.01" value="0.1">
        </div>
      </div>

      <div class="section">
        <h3>Grid</h3>
        <div class="input-row">
          <label>Pixels per Meter:</label>
          <input type="number" id="pxPerMeter" value="40" min="20" max="100" onchange="draw()">
        </div>
      </div>

      <div class="section">
        <button class="btn" onclick="clearAll()" style="background: #e74c3c;">
          🗑️ Clear All
        </button>
        <button class="btn" onclick="clearFreehand()" style="background: #e67e22;">
          🧹 Clear Freehand Only
        </button>
      </div>
    </div>

    <!-- Canvas Area -->
    <div class="canvas-container">
      <div class="toolbar">
        <button onclick="zoomIn()">🔍+</button>
        <button onclick="zoomOut()">🔍−</button>
        <button onclick="resetZoom()">Reset</button>
        <button onclick="panMode = !panMode; updateInfo()">
          🤚 <span id="panStatus">Pan Off</span>
        </button>
      </div>
      <canvas id="canvas"></canvas>
      <div class="info" id="info">Click and drag to draw rooms</div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <h2>📋 Rooms</h2>
      <div id="roomsList"></div>
      
      <button class="calc-btn" onclick="calculate()">
        🧮 Calculate Carpet
      </button>
      
      <div id="results"></div>
    </div>
  </div>

  <!-- Load Plan Modal -->
  <div id="loadModal" class="modal">
    <div class="modal-content">
      <h3>📂 Load Saved Plans</h3>
      <div id="savedPlansList"></div>
      <div style="margin-top: 15px;">
        <button class="btn-danger" onclick="closeLoadModal()">Close</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/carpet-calculator.js"></script>
</body>
</html>
