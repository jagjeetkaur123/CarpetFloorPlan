<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="32" fill="#2c3e50"/>
  <!-- Floor grid -->
  <rect x="24" y="24" width="144" height="144" rx="8" fill="#34495e"/>
  <!-- Grid lines -->
  <line x1="24" y1="72" x2="168" y2="72" stroke="#4a6278" stroke-width="2"/>
  <line x1="24" y1="120" x2="168" y2="120" stroke="#4a6278" stroke-width="2"/>
  <line x1="72" y1="24" x2="72" y2="168" stroke="#4a6278" stroke-width="2"/>
  <line x1="120" y1="24" x2="120" y2="168" stroke="#4a6278" stroke-width="2"/>
  <!-- Room outline -->
  <rect x="36" y="36" width="84" height="60" rx="3" fill="none" stroke="#3498db" stroke-width="4"/>
  <!-- Second room -->
  <rect x="36" y="108" width="48" height="48" rx="3" fill="none" stroke="#e67e22" stroke-width="4"/>
  <!-- Carpet texture dots -->
  <circle cx="60" cy="60" r="3" fill="#3498db" opacity="0.6"/>
  <circle cx="80" cy="60" r="3" fill="#3498db" opacity="0.6"/>
  <circle cx="100" cy="60" r="3" fill="#3498db" opacity="0.6"/>
  <circle cx="60" cy="80" r="3" fill="#3498db" opacity="0.6"/>
  <circle cx="80" cy="80" r="3" fill="#3498db" opacity="0.6"/>
  <circle cx="100" cy="80" r="3" fill="#3498db" opacity="0.6"/>
</svg>
